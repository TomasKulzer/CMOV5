<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5G Core & RAN Real-time Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f0f12; color: #00ff99; font-family: 'Courier New', monospace; margin: 25px; }
        h1 { border-bottom: 2px solid #00ff99; padding-bottom: 10px; text-shadow: 0 0 8px #00ff99; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 20px; }
        .panel { background-color: #16161a; border: 1px solid #333; border-radius: 6px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .panel h2 { color: #00cbd6; margin-top: 0; font-size: 1.1rem; text-transform: uppercase; }
        canvas { max-height: 240px; }
    </style>
</head>
<body>

    <h1>⚡ 5G RAN & CORE MONITOR (SUBPROCESS PIPE ENGINE)</h1>
    <p>System status: <span style="color:#fff; background:#00aa55; padding:2px 6px; border-radius:3px;">LIVE STREAMING</span></p>

    <div class="grid">
        <div class="panel">
            <h2>RAN Throughput (Live xApp)</h2>
            <canvas id="chart_xapp_thp"></canvas>
        </div>
        <div class="panel">
            <h2>PRB Resource Allocation (Live xApp)</h2>
            <canvas id="chart_xapp_prb"></canvas>
        </div>

        <div class="panel">
            <h2>iPerf Core Delivery (Task 4 Logs)</h2>
            <canvas id="chart_core_thp"></canvas>
        </div>
        <div class="panel">
            <h2>User Plane Latency (Task 3/4 Logs)</h2>
            <canvas id="chart_core_rtt"></canvas>
        </div>
    </div>

<script>
const createChartConfig = (yLabel, datasets) => ({
    type: 'line',
    data: { datasets },
    options: {
        animation: false,
        scales: {
            x: { type: 'linear', grid: { color: '#222' }, title: { display: true, text: 'Timeline', color: '#999' } },
            y: { grid: { color: '#222' }, title: { display: true, text: yLabel, color: '#999' } }
        },
        plugins: { legend: { labels: { color: '#fff', font: { family: 'Courier New' } } } }
    }
});

const c1 = new Chart(document.getElementById('chart_xapp_thp'), createChartConfig('kbps', [
    { label: 'DL Throughput', data: [], borderColor: '#00ff99', backgroundColor: '#00ff99', tension: 0.1 },
    { label: 'UL Throughput', data: [], borderColor: '#ff0055', backgroundColor: '#ff0055', tension: 0.1 }
]));

const c2 = new Chart(document.getElementById('chart_xapp_prb'), createChartConfig('PRBs', [
    { label: 'PRB Dl Util', data: [], borderColor: '#00cbd6', backgroundColor: '#00cbd6', tension: 0.1 },
    { label: 'PRB Ul Util', data: [], borderColor: '#ffcc00', backgroundColor: '#ffcc00', tension: 0.1 }
]));

const c3 = new Chart(document.getElementById('chart_core_thp'), createChartConfig('Mbps', [
    { label: 'UE1 DL (TCP)', data: [], borderColor: '#a855f7', tension: 0.1 },
    { label: 'UE2 DL (TCP)', data: [], borderColor: '#ec4899', tension: 0.1 }
]));

const c4 = new Chart(document.getElementById('chart_core_rtt'), createChartConfig('ms', [
    { label: 'UE1 RTT', data: [], borderColor: '#3b82f6', tension: 0.1 },
    { label: 'UE2 RTT', data: [], borderColor: '#f97316', tension: 0.1 }
]));

function pollSystem() {
    fetch('/api/data')
        .then(res => res.json())
        .then(data => {
            // Populate xApp Streaming Charts
            c1.data.datasets[0].data = data.xapp["DRB.UEThpDl"];
            c1.data.datasets[1].data = data.xapp["DRB.UEThpUl"];
            c1.update('none');

            c2.data.datasets[0].data = data.xapp["RRU.PrbTotDl"];
            c2.data.datasets[1].data = data.xapp["RRU.PrbTotUl"];
            c2.update('none');

            // Populate Task 4 Log Analysis Charts
            c3.data.datasets[0].data = data.iperf.ue1_20_dl;
            c3.data.datasets[1].data = data.iperf.ue2_20_dl;
            c3.update('none');

            c4.data.datasets[0].data = data.ping.ue1_20_dl;
            c4.data.datasets[1].data = data.ping.ue2_20_dl;
            c4.update('none');
        });
}

setInterval(pollSystem, 1000);
pollSystem();
</script>
</body>
</html>
